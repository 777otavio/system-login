<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>
<body>
    <div id="cadastro" class="oculto">
        <h1 class="cadastro">Cadastro</h1>
        <p>Usuario</p>
        <input type="text" placeholder="Usuario" id="usuario-cadastro">
        <p>Senha</p>
        <input type="password" placeholder="Senha" id="senha-cadastro">
        <p>Cofirme sua Senha</p>
        <input type="password" placeholder="Cofirmar" id="cofirmar-senha">
        <p id="cofirmacao-errada" class="erro">Senhas não confere!</p>
        <button onclick="criacao()">Cadastrar</button>
    </div>
    <div id="login" class="oculto">
        <h1>Login</h1>
        <p>Usuario</p>
        <input type="text" placeholder="Digite seu usuario" id="usuario-login">
        <p>Senha</p>
        <input type="password" placeholder="Digite sua senha..." id="senha-login">
        <p id="erro" class="erro">Usuario ou Senha Incorretos!</p>
        <p id="campos" class="erro">Preencha os campos a cima!</p>
        <a href="#" onclick="cadastro()">Cadastre-Se</a>
        <button id="entrar" onclick="entrar()">ENTRAR</button>            
    </div>
    <script src="script.js"></script>
</body>
</html>
